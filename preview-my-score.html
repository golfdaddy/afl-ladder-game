<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>League Comparison — Competition Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="min-h-screen bg-slate-50">

  <!-- Dark header -->
  <div class="bg-slate-900">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 pt-6 pb-8">
      <div class="flex justify-between items-start">
        <div class="flex items-start gap-3">
          <div class="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-800 text-slate-400 mt-0.5 flex-shrink-0">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
          </div>
          <div>
            <p class="text-slate-500 text-xs font-semibold uppercase tracking-widest mb-1">Competition</p>
            <h1 class="text-2xl font-black text-white">The Buoys League</h1>
          </div>
        </div>
        <span class="px-3 py-1 rounded-full text-xs font-semibold bg-slate-700 text-slate-400">Private</span>
      </div>
      <div class="mt-6 flex gap-6">
        <div>
          <p class="text-2xl font-black text-white">4</p>
          <p class="text-slate-500 text-xs mt-0.5">Members</p>
        </div>
        <div class="w-px bg-slate-800"></div>
        <div>
          <p class="text-2xl font-black text-emerald-400">4</p>
          <p class="text-slate-500 text-xs mt-0.5">Submitted</p>
        </div>
      </div>
    </div>
  </div>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">

    <!-- League Comparison Card -->
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <!-- Header -->
      <div class="px-6 py-5 border-b border-slate-100 flex items-center gap-3">
        <div class="w-8 h-8 bg-red-100 rounded-xl flex items-center justify-center flex-shrink-0">
          <span class="text-base">&#128274;</span>
        </div>
        <div class="flex-1 min-w-0">
          <h2 class="text-lg font-bold text-slate-900">League Comparison</h2>
          <p class="text-sm text-slate-500 mt-0.5">AFL ladder vs everyone's predictions — tap a team for detail</p>
        </div>
      </div>

      <!-- Zone + key legend -->
      <div class="px-5 py-2.5 border-b border-slate-100 flex gap-4 flex-wrap items-center" id="zoneLegend"></div>

      <!-- Comparison table (single scrollable container keeps columns aligned) -->
      <div class="overflow-x-auto hide-scrollbar" id="tableScroller">
        <table class="w-full border-collapse" style="min-width:600px">
          <thead>
            <tr>
              <th class="sticky left-0 z-10 bg-slate-900 h-14 px-3 text-left align-bottom pb-2 min-w-[180px]" style="box-shadow:3px 0 8px -3px rgba(0,0,0,0.1)">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">AFL Ladder</span>
              </th>
              <!-- Member headers injected by JS -->
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
          <tfoot>
            <tr id="totalsRow" class="border-t-2 border-slate-200"></tr>
          </tfoot>
        </table>
      </div>

      <!-- Footer -->
      <div class="px-4 py-3 bg-slate-50 border-t border-slate-100 flex items-center gap-5 flex-wrap text-xs text-slate-400">
        <span class="flex items-center gap-1 font-semibold text-emerald-600">&#10003;</span>
        <span>= nailed it</span>
        <span class="mx-1 text-slate-200">|</span>
        <span>Points = |predicted &minus; actual| &middot; lower is better</span>
        <span class="mx-1 text-slate-200">|</span>
        <span class="flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-amber-400 inline-block"></span>
          <span class="font-semibold text-amber-600">Key team</span> = 3+ positions apart in the league
        </span>
        <span class="mx-1 text-slate-200">|</span>
        <span class="text-slate-300">Grey row</span> = everyone agrees
      </div>
    </div>

    <!-- Team Detail Drawer -->
    <div id="teamDrawer" class="mt-4 hidden">
      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 flex items-center gap-3" id="drawerHeader"></div>
        <div id="drawerContent"></div>
      </div>
    </div>

  </main>

<script>
// ── AFL Team Data ──
const AFL_TEAMS = [
  { name: 'Melbourne',        shortName: 'MEL', primaryColor: '#041E42', secondaryColor: '#CC2031', textColor: '#FFFFFF' },
  { name: 'St Kilda',         shortName: 'STK', primaryColor: '#000000', secondaryColor: '#ED1C24', textColor: '#FFFFFF' },
  { name: 'Collingwood',      shortName: 'COL', primaryColor: '#000000', secondaryColor: '#FFFFFF', textColor: '#FFFFFF' },
  { name: 'Brisbane Lions',   shortName: 'BRL', primaryColor: '#69003B', secondaryColor: '#0055A3', textColor: '#FFFFFF' },
  { name: 'Port Adelaide',    shortName: 'PTA', primaryColor: '#008AAB', secondaryColor: '#000000', textColor: '#FFFFFF' },
  { name: 'Carlton',          shortName: 'CAR', primaryColor: '#001B2A', secondaryColor: '#FFFFFF', textColor: '#FFFFFF' },
  { name: 'North Melbourne',  shortName: 'NTH', primaryColor: '#003C71', secondaryColor: '#FFFFFF', textColor: '#FFFFFF' },
  { name: 'GWS Giants',       shortName: 'GWS', primaryColor: '#F15C22', secondaryColor: '#4A4F55', textColor: '#FFFFFF' },
  { name: 'Richmond',         shortName: 'RIC', primaryColor: '#000000', secondaryColor: '#FED102', textColor: '#FED102' },
  { name: 'Fremantle',        shortName: 'FRE', primaryColor: '#2E0854', secondaryColor: '#FFFFFF', textColor: '#FFFFFF' },
  { name: 'Essendon',         shortName: 'ESS', primaryColor: '#000000', secondaryColor: '#CC2031', textColor: '#CC2031' },
  { name: 'Adelaide Crows',   shortName: 'ADE', primaryColor: '#002654', secondaryColor: '#E21E31', textColor: '#FFD200' },
  { name: 'Gold Coast Suns',  shortName: 'GCS', primaryColor: '#CF2032', secondaryColor: '#F4B223', textColor: '#FFFFFF' },
  { name: 'Geelong',          shortName: 'GEE', primaryColor: '#001F3D', secondaryColor: '#FFFFFF', textColor: '#FFFFFF' },
  { name: 'Hawthorn',         shortName: 'HAW', primaryColor: '#4D2004', secondaryColor: '#FBBF15', textColor: '#FBBF15' },
  { name: 'Sydney Swans',     shortName: 'SYD', primaryColor: '#ED171F', secondaryColor: '#FFFFFF', textColor: '#FFFFFF' },
  { name: 'West Coast Eagles',shortName: 'WCE', primaryColor: '#002B5C', secondaryColor: '#F2A900', textColor: '#F2A900' },
  { name: 'Western Bulldogs', shortName: 'WBD', primaryColor: '#014896', secondaryColor: '#E1251B', textColor: '#FFFFFF' },
];

const getTeamMeta = (name) => AFL_TEAMS.find(t => t.name === name) || {
  name, shortName: name.slice(0,3).toUpperCase(), primaryColor: '#334155', secondaryColor: '#fff', textColor: '#fff'
};

// ── Mock AFL Ladder ──
const aflLadder = [
  'Geelong', 'Sydney Swans', 'Brisbane Lions', 'Carlton',
  'Collingwood', 'Port Adelaide', 'Western Bulldogs', 'Hawthorn',
  'Fremantle', 'GWS Giants', 'Melbourne', 'Essendon',
  'Adelaide Crows', 'St Kilda', 'Richmond', 'Gold Coast Suns',
  'North Melbourne', 'West Coast Eagles'
];

// ── Mock Members ──
const members = [
  { name: 'Matt',  userId: 1, isMe: true,  ladder: ['Carlton','Brisbane Lions','Geelong','Collingwood','Sydney Swans','Melbourne','Port Adelaide','Fremantle','Hawthorn','Western Bulldogs','Essendon','GWS Giants','Richmond','St Kilda','Adelaide Crows','Gold Coast Suns','North Melbourne','West Coast Eagles'] },
  { name: 'Davo',  userId: 2, isMe: false, ladder: ['Geelong','Carlton','Sydney Swans','Brisbane Lions','Collingwood','Hawthorn','Port Adelaide','Melbourne','Fremantle','Western Bulldogs','Essendon','GWS Giants','Adelaide Crows','Richmond','St Kilda','Gold Coast Suns','North Melbourne','West Coast Eagles'] },
  { name: 'Simmo', userId: 3, isMe: false, ladder: ['Sydney Swans','Geelong','Collingwood','Carlton','Brisbane Lions','Western Bulldogs','Hawthorn','Port Adelaide','Melbourne','Fremantle','GWS Giants','Essendon','St Kilda','Adelaide Crows','Richmond','North Melbourne','Gold Coast Suns','West Coast Eagles'] },
  { name: 'Bazza', userId: 4, isMe: false, ladder: ['Brisbane Lions','Geelong','Carlton','Sydney Swans','Port Adelaide','Collingwood','Fremantle','Hawthorn','Melbourne','Western Bulldogs','GWS Giants','Essendon','Adelaide Crows','St Kilda','Gold Coast Suns','Richmond','West Coast Eagles','North Melbourne'] },
];

// ── Helpers ──
const zones = [
  { label: 'Top 4',  positions: '1\u20134',  range: [0,3],   text: 'text-emerald-600', dot: 'bg-emerald-500' },
  { label: 'Finals', positions: '5\u201310', range: [4,9],   text: 'text-blue-600',    dot: 'bg-blue-500' },
  { label: 'Mid',    positions: '11\u201314',range: [10,13],  text: 'text-slate-500',   dot: 'bg-slate-400' },
  { label: 'Bottom', positions: '15\u201318',range: [14,17],  text: 'text-red-500',     dot: 'bg-red-500' },
];
const getZone = (i) => zones.find(z => i >= z.range[0] && i <= z.range[1]);

function posBadgeClass(i) {
  if (i < 4) return 'bg-emerald-500 text-white';
  if (i < 10) return 'bg-blue-100 text-blue-700';
  if (i < 14) return 'bg-slate-100 text-slate-600';
  return 'bg-red-100 text-red-600';
}

function ptsColor(pts) {
  if (pts === 0) return 'text-emerald-500';
  if (pts <= 2) return 'text-emerald-600';
  if (pts <= 4) return 'text-amber-500';
  return 'text-red-500';
}

function getScore(member, teamName) {
  const actualPos = aflLadder.indexOf(teamName) + 1;
  const predIdx = member.ladder.indexOf(teamName);
  const predictedPos = predIdx >= 0 ? predIdx + 1 : null;
  const diff = predictedPos !== null ? predictedPos - actualPos : null;
  const points = diff !== null ? Math.abs(diff) : null;
  return { predictedPos, diff, points };
}

function totalFor(member) {
  return aflLadder.reduce((sum, team) => sum + (getScore(member, team).points || 0), 0);
}

// ── Classify each team row ──
function classifyTeam(teamName) {
  const positions = members.map(m => m.ladder.indexOf(teamName) + 1);
  const allSame = positions.every(p => p === positions[0]);
  const spread = Math.max(...positions) - Math.min(...positions);
  const isKeyTeam = spread >= 3;
  return { allSame, isKeyTeam, spread };
}

// Sort: user first, then by total
members.sort((a, b) => {
  if (a.isMe) return -1;
  if (b.isMe) return 1;
  return totalFor(a) - totalFor(b);
});

// ── Zone legend ──
document.getElementById('zoneLegend').innerHTML = zones.map(z => `
  <div class="flex items-center gap-1.5">
    <span class="w-2 h-2 rounded-full flex-shrink-0 ${z.dot}"></span>
    <span class="text-xs font-semibold ${z.text}">${z.label}</span>
    <span class="text-xs text-slate-400">${z.positions}</span>
  </div>
`).join('');

// ── Build table ──
const thead = document.querySelector('thead tr');
members.forEach(member => {
  const total = totalFor(member);
  thead.innerHTML += `
    <th class="h-14 px-2 align-bottom pb-2 min-w-[5.5rem] border-l border-slate-100 ${member.isMe ? 'bg-emerald-50' : 'bg-slate-50'}">
      <span class="text-xs font-bold text-slate-900 block truncate">${member.name}</span>
      <div class="flex items-center gap-1 mt-0.5">
        ${member.isMe ? '<span class="text-[10px] font-semibold text-emerald-600">You</span><span class="text-[10px] text-slate-400">&middot;</span>' : ''}
        <span class="text-[10px] text-slate-400 font-semibold">${total} pts</span>
      </div>
    </th>`;
});

const tbody = document.getElementById('tableBody');
aflLadder.forEach((team, i) => {
  const meta = getTeamMeta(team);
  const zone = getZone(i);
  const borderStyle = meta.primaryColor === '#000000' ? 'border:1px solid #333' : 'border:none';
  const { allSame, isKeyTeam } = classifyTeam(team);

  // Row styling
  const rowBg = allSame ? 'bg-slate-50/60' : isKeyTeam ? 'bg-amber-50/40' : '';
  const textOpacity = allSame ? 'opacity-40' : '';

  let row = `<tr class="border-b border-slate-50 cursor-pointer hover:bg-slate-100/50 transition-colors ${rowBg}" onclick="showTeamDetail('${team.replace(/'/g, "\\'")}')">`;

  // Sticky AFL column
  row += `
    <td class="sticky left-0 z-10 bg-white h-12 px-2 ${allSame ? 'bg-slate-50/60' : ''}" style="box-shadow:3px 0 8px -3px rgba(0,0,0,0.1)">
      <div class="flex items-center gap-2 ${textOpacity}">
        <span class="inline-flex items-center justify-center w-5 h-5 rounded text-[10px] font-black flex-shrink-0 ${posBadgeClass(i)}">${i+1}</span>
        <div class="w-7 h-7 rounded-lg flex items-center justify-center text-[10px] font-black shadow-sm flex-shrink-0"
             style="background-color:${meta.primaryColor};color:${meta.textColor};${borderStyle}">
          ${meta.shortName}
        </div>
        <div class="min-w-0 hidden sm:block">
          <div class="flex items-center gap-1.5">
            <p class="font-semibold text-slate-900 text-xs leading-tight truncate">${team}</p>
            ${isKeyTeam ? '<span class="w-1.5 h-1.5 rounded-full bg-amber-400 flex-shrink-0"></span>' : ''}
          </div>
          <p class="text-[10px] ${zone.text}">${zone.label}</p>
        </div>
      </div>
    </td>`;

  // Member cells
  members.forEach(member => {
    const { predictedPos, diff, points } = getScore(member, team);
    const pts = points ?? 0;

    let cellContent;
    if (allSame) {
      // Everyone agrees — muted
      cellContent = `<span class="text-[10px] text-slate-300">#${predictedPos}</span>`;
    } else if (pts === 0) {
      cellContent = `<span class="text-xs font-black text-emerald-500">&#10003;</span>`;
    } else {
      const arrow = diff < 0
        ? `<svg class="w-2.5 h-2.5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"/></svg>`
        : `<svg class="w-2.5 h-2.5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/></svg>`;
      const boldClass = isKeyTeam ? 'font-black text-sm' : 'text-xs font-black';
      cellContent = `
        <span class="text-[10px] ${isKeyTeam ? 'font-bold text-slate-700' : 'font-bold text-slate-500'}">#${predictedPos}</span>
        <span class="flex items-center gap-px">
          ${arrow}
          <span class="${boldClass} ${ptsColor(pts)}">${pts}</span>
        </span>`;
    }

    const cellBg = allSame ? '' : pts === 0 ? 'bg-emerald-50/50' : member.isMe ? 'bg-emerald-50/20' : '';
    row += `<td class="h-12 text-center border-l border-slate-50 ${cellBg}"><div class="flex items-center justify-center gap-1 px-1">${cellContent}</div></td>`;
  });

  row += '</tr>';
  tbody.innerHTML += row;
});

// ── Totals row ──
const totalsRow = document.getElementById('totalsRow');
const best = Math.min(...members.map(m => totalFor(m)));

totalsRow.innerHTML = `
  <td class="sticky left-0 z-10 bg-slate-900 px-3 py-3" style="box-shadow:3px 0 8px -3px rgba(0,0,0,0.1)">
    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Total</span>
  </td>`;

members.forEach(member => {
  const total = totalFor(member);
  totalsRow.innerHTML += `
    <td class="border-l border-slate-100 px-2 py-3 text-center ${member.isMe ? 'bg-emerald-50' : 'bg-slate-50'}">
      <span class="text-lg font-black ${total === best ? 'text-emerald-600' : 'text-slate-900'}">${total}</span>
      <p class="text-[10px] text-slate-400 mt-0.5">${total === best ? 'Leading!' : `+${total - best}`}</p>
    </td>`;
});

// ── Team Detail Drawer ──
function showTeamDetail(teamName) {
  const meta = getTeamMeta(teamName);
  const actualPos = aflLadder.indexOf(teamName) + 1;
  const borderStyle = meta.primaryColor === '#000000' ? 'border:1px solid #333' : 'border:none';
  const { isKeyTeam, spread } = classifyTeam(teamName);

  const drawer = document.getElementById('teamDrawer');
  drawer.classList.remove('hidden');

  document.getElementById('drawerHeader').innerHTML = `
    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-sm font-black shadow-sm flex-shrink-0"
         style="background-color:${meta.primaryColor};color:${meta.textColor};${borderStyle}">${meta.shortName}</div>
    <div>
      <p class="font-bold text-slate-900">${teamName}${isKeyTeam ? ' <span class="text-xs font-bold text-amber-600 ml-1">Key Team &middot; ${spread} pos spread</span>' : ''}</p>
      <p class="text-xs text-slate-500">Currently #${actualPos} on the AFL ladder</p>
    </div>`;

  const rows = members.map(m => {
    const { predictedPos, diff, points } = getScore(m, teamName);
    return { ...m, predictedPos, diff, points, error: points };
  }).sort((a, b) => a.predictedPos - b.predictedPos);

  let html = `
    <div class="grid grid-cols-[1fr_auto_auto_auto] gap-x-4 px-6 py-2 bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-400 uppercase tracking-wider">
      <span>Member</span>
      <span class="text-right w-20">Predicted</span>
      <span class="text-right w-16">Actual</span>
      <span class="text-right w-12">Pts</span>
    </div>`;

  rows.forEach(row => {
    const diffColor = row.error === 0 ? 'text-emerald-600 bg-emerald-50' :
      row.error <= 2 ? 'text-amber-600 bg-amber-50' :
      row.error <= 5 ? 'text-orange-600 bg-orange-50' : 'text-red-600 bg-red-50';

    html += `
      <div class="grid grid-cols-[1fr_auto_auto_auto] gap-x-4 px-6 py-3 border-b border-slate-50 items-center ${row.isMe ? 'bg-emerald-50/60' : 'hover:bg-slate-50'}">
        <div class="flex items-center gap-2">
          <span class="text-sm font-semibold text-slate-900">${row.name}</span>
          ${row.isMe ? '<span class="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-semibold">You</span>' : ''}
        </div>
        <div class="text-right w-20"><span class="text-lg font-black text-slate-900">#${row.predictedPos}</span></div>
        <div class="text-right w-16"><span class="text-sm font-semibold text-slate-500">#${actualPos}</span></div>
        <div class="text-right w-12">
          <span class="inline-flex items-center justify-center w-8 h-8 rounded-xl text-xs font-black ${diffColor}">
            ${row.error === 0 ? '&#10003;' : row.error}
          </span>
        </div>
      </div>`;
  });

  document.getElementById('drawerContent').innerHTML = html;
  drawer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
</body>
</html>

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: afl_ladder_postgres
    environment:
      POSTGRES_USER: afl_user
      POSTGRES_PASSWORD: afl_password
      POSTGRES_DB: afl_ladder_game
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afl_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: afl_ladder_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
